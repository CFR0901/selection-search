<!DOCTYPE html>
<html>
<head>
    <title>Debug: Check Options Value</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .debug-box {
            background: #f0f0f0;
            padding: 20px;
            border: 2px solid #333;
            margin: 20px 0;
            border-radius: 5px;
        }
        pre {
            background: #fff;
            padding: 15px;
            border: 1px solid #ccc;
            overflow-x: auto;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🔍 Debug: Options Check</h1>

    <div class="debug-box">
        <h2>Step 1: Check Storage</h2>
        <button onclick="checkStorage()">Check Storage Value</button>
        <pre id="storage-result">Click button to check...</pre>
    </div>

    <div class="debug-box">
        <h2>Step 2: Check Context Script Data</h2>
        <button onclick="checkContentScriptData()">Check ContentScript Data</button>
        <pre id="content-script-result">Click button to check...</pre>
    </div>

    <div class="debug-box">
        <h2>Step 3: Test hasQuery() Logic</h2>
        <p>This simulates what happens in toolbar popup:</p>
        <button onclick="testHasQueryLogic()">Test hasQuery()</button>
        <pre id="hasquery-result">Click button to test...</pre>
    </div>

    <script>
        function checkStorage() {
            chrome.runtime.sendMessage({action: "getOptions"}, function(response) {
                document.getElementById('storage-result').textContent =
                    JSON.stringify(response, null, 2);
            });
        }

        function checkContentScriptData() {
            chrome.runtime.sendMessage({action: "getContentScriptData"}, function(response) {
                const result = {
                    allow_engines_without_selection: response.options.allow_engines_without_selection,
                    context_menu: response.options.context_menu,
                    toolbar_popup: response.options.toolbar_popup,
                    engines_count: response.engines ? response.engines.length : 0
                };
                document.getElementById('content-script-result').textContent =
                    JSON.stringify(result, null, 2);
            });
        }

        function testHasQueryLogic() {
            chrome.runtime.sendMessage({action: "getContentScriptData"}, function(response) {
                const cachedOptions = response.options;
                const queryText = "";  // Simulating empty query

                const hasQueryResult = (cachedOptions && cachedOptions.allow_engines_without_selection)
                    ? true
                    : queryText.length > 0;

                const result = {
                    cachedOptions_exists: !!cachedOptions,
                    allow_engines_without_selection: cachedOptions?.allow_engines_without_selection,
                    queryText: queryText,
                    queryText_length: queryText.length,
                    hasQuery_returns: hasQueryResult,
                    explanation: hasQueryResult
                        ? "✅ hasQuery() returns TRUE - clicking should work"
                        : "❌ hasQuery() returns FALSE - clicking will focus input"
                };

                document.getElementById('hasquery-result').textContent =
                    JSON.stringify(result, null, 2);
            });
        }
    </script>
</body>
</html>
